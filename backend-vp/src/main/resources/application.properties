spring.profiles.include=local

# Conexão com o Banco de Dados (Buscando do Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Segurança JWT (Buscando do Render)
api.security.token.secret=${JWT_SECRET}

# [CORREÇÃO] SpringDoc — necessário no Spring Boot 4 para o Swagger não
# ser bloqueado pelo MVC antes de chegar no SecurityConfig
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs